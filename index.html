<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/6da04cfc57.js" crossorigin="anonymous"></script>
    <title>To-do List</title>
</head>
<body>
    
    <main id="main">
        <form action="#" id="form">
            <input type="text" id="nome-tarefa" placeholder="Digite sua tarefa">
            <input type="submit" id="criar-tarefa" value="Criar tarefa">
        </form>

        <div id="filters">
            <button class="todas">Todas</button>
            <button class="Concluídas">Concluídas</button>
            <button class="Pendentes">Pendentes</button>
        </div>
    </main>


</body>
</html>
