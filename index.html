<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/6da04cfc57.js" crossorigin="anonymous"></script>
    <title>To-do List</title>
</head>
<body>
    
    <main id="main">
        <section class="funcionalidades">
            <form action="#" id="form">
                <input type="text" id="nome-tarefa" placeholder="Digite sua tarefa">
                <input type="submit" id="criar-tarefa" value="Criar tarefa">
            </form>

            <div id="filtros">
                <button class="todas">Todas</button>
                <button class="Concluídas">Concluídas</button>
                <button class="Pendentes">Pendentes</button>
            </div>
        </section>

        <section class="lista-de-tarefas">
            <div class="tarefa">
                <div class="status-conteiner">
                    <label for="status"></label>
                    <input type="checkbox" id="status">
                </div>

                <div class="tarefa">
                    <p>Tarefa de Exemplo</p>

                    <div class="icons">
                        <button><i class="fa-solid fa-pen-to-square" style="color: rgb(33, 64, 175);"></i></button>
                        <button><i class="fa-solid fa-trash" style="color: rgb(33, 64, 175);"></i></button>
                    </div>
                </div>
                
            </div>
        </section>
    </main>


</body>
</html>
